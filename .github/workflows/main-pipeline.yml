name: DevSecOps Pipeline Orchestrator

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# 🛡️ Add this block right here
permissions:
  contents: read       # Required to checkout the code
  pull-requests: read  # Required for Snyk/Sonar to analyze PR metadata
  security-events: write # Required if you are uploading SARIF results
  actions: read # Only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

# Ensure that only one workflow run is running at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # 1. Call API CI file
  call-api-ci:
    uses: ./.github/workflows/CI.yml # 👈 Path to your file
    secrets: inherit # Pass secrets down to the sub-workflow

  # 2. Call SAST file
  call-sast:
    uses: ./.github/workflows/SAST.yml
    secrets: inherit

  # 3. Call SCA file
  call-sca:
    uses: ./.github/workflows/SCA.yml
    secrets: inherit

  # 🚀 THE FINAL GATE: This job ONLY runs if all 3 'calls' above return success
  build-and-push-docker-image:
    needs: [call-api-ci, call-sca]
    uses: ./.github/workflows/CB.yml
    secrets: inherit

  # 4. Call Container Scan
  call-cs:
    uses: ./.github/workflows/CS.yml
    needs: build-and-push-docker-image
    secrets: inherit